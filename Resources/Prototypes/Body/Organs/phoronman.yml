- type: entity
  id: BasePhoronmanOrgan
  abstract: true
  components:
  - type: Sprite
    sprite: Mobs/Species/Phoronman/organs.rsi
  - type: SolutionContainerManager
    solutions:
      organ:
        reagents:
        - ReagentId: Nutriment
          Quantity: 5 # Not very nutritious
        - ReagentId: Phoron
          Quantity: 2.5
      food:
        maxVol: 5
        reagents:
        - ReagentId: Phoron
          Quantity: 5
  - type: Extractable
    grindableSolutionName: food
    juiceSolution:
      reagents:
      - ReagentId: Phoron
        Quantity: 5
  - type: FlavorProfile
    flavors:
      - phoron

- type: entity
  id: OrganPhoronmanLungs
  parent: [ BasePhoronmanOrgan, OrganHumanLungs ]
  name: phoronman lungs
  description: The lungs yearn for the phoron. Only phoron gas can satiate these lungs, and oxygen is lethally toxic.
  components:
  - type: Sprite
    layers:
    - state: lungs
  - type: Metabolizer
    metabolizerTypes: [ Phoronman ]
  - type: Lung
    alert: LowPhoron
  - type: SolutionContainerManager
    solutions:
      organ:
        reagents:
        - ReagentId: Nutriment
          Quantity: 5
        - ReagentId: Phoron
          Quantity: 2.5
      Lung:
        maxVol: 100.0
        canReact: false
      food:
        maxVol: 5
        reagents:
        - ReagentId: Phoron
          Quantity: 5

- type: entity
  id: OrganPhoronmanStomach
  parent: [ BasePhoronmanOrgan, OrganHumanStomach ]
  name: phoronman stomach
  description: Why do phoronmen have stomachs if they don't need to eat?
  components:
  - type: Metabolizer
    metabolizerTypes: [ Phoronman ]
  - type: SolutionContainerManager
    solutions:
      organ:
        reagents:
        - ReagentId: Nutriment
          Quantity: 8
        - ReagentId: Phoron
          Quantity: 4
      stomach:
        maxVol: 50
      food:
        maxVol: 8
        reagents:
        - ReagentId: Phoron
          Quantity: 8
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Phoron
        Quantity: 8

- type: entity
  id: OrganPhoronmanEyes
  parent: [ BasePhoronmanOrgan, OrganHumanEyes ]
  name: phoronman eyes
  components:
  - type: Sprite
    layers:
    - state: eyes

- type: entity
  id: OrganPhoronmanLiver
  parent: [ BasePhoronmanOrgan, OrganHumanLiver ]
  name: phoronman liver
  components:
  - type: Metabolizer
    metabolizerTypes: [ Phoronman ]

- type: entity
  id: OrganPhoronmanTongue
  parent: [ BasePhoronmanOrgan, OrganHumanTongue ]
  name: phoronman tongue

- type: entity
  id: OrganPhoronmanKidneys
  parent: [ BasePhoronmanOrgan, OrganHumanKidneys ]
  name: phoronman kidneys
  components:
  - type: Sprite
    layers:
    - state: kidneys
  - type: Metabolizer
    metabolizerTypes: [ Phoronman ]

- type: entity
  id: OrganPhoronmanHeart
  parent: [ BasePhoronmanOrgan, OrganHumanHeart ]
  name: phoronman heart
  description: It pulses with phoron even outside the body.
  components:
  - type: Metabolizer
    metabolizerTypes: [ Phoronman ]

- type: entity
  id: OrganPhoronmanBrain
  parent: [ BasePhoronmanOrgan, OrganHumanBrain ]
  name: phoronman brain
  components:
  - type: SolutionContainerManager
    solutions:
      organ:
        reagents:
        - ReagentId: Nutriment
          Quantity: 5
        - ReagentId: Phoron
          Quantity: 2.5
      food:
        maxVol: 10
        reagents:
        - ReagentId: GreyMatter
          Quantity: 5
        - ReagentId: Phoron
          Quantity: 5
